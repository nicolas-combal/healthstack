name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up environment variables
      run: |
        cp .env.ci .env

    - name: Build and run Docker containers
      run: |
        docker network ls | grep $APP_NETWORK || docker network create --driver bridge $APP_NETWORK
        docker-compose up --build
